<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
	<!-- background -->
	<rect width="512" height="512" rx="80" fill="#2F4858"/>

	<!-- book pages (behind cover, peeking out on the right) -->
	<rect x="156" y="146" width="230" height="290" rx="6" fill="#F1E6C8"/>
	<line x1="366" y1="160" x2="366" y2="422" stroke="#D8C9A3" stroke-width="3"/>
	<line x1="372" y1="160" x2="372" y2="422" stroke="#D8C9A3" stroke-width="3"/>
	<line x1="378" y1="160" x2="378" y2="422" stroke="#D8C9A3" stroke-width="3"/>

	<!-- book cover -->
	<rect x="140" y="130" width="230" height="290" rx="12" fill="#6B4226"/>
	<!-- spine shading -->
	<rect x="140" y="130" width="20" height="290" rx="10" fill="#54331C"/>
	<!-- embossed border -->
	<rect x="168" y="158" width="178" height="234" rx="6" fill="none" stroke="#C9A063" stroke-width="4"/>

	<!-- webbing wrapped around the book: vertical strap -->
	<rect x="236" y="70" width="44" height="372" fill="#F4A300"/>
	<line x1="242" y1="70" x2="242" y2="442" stroke="#C97D00" stroke-width="3" stroke-dasharray="10 8"/>
	<line x1="274" y1="70" x2="274" y2="442" stroke="#C97D00" stroke-width="3" stroke-dasharray="10 8"/>

	<!-- webbing wrapped around the book: horizontal strap -->
	<rect x="70" y="234" width="372" height="44" fill="#F4A300"/>
	<line x1="70" y1="240" x2="442" y2="240" stroke="#C97D00" stroke-width="3" stroke-dasharray="10 8"/>
	<line x1="70" y1="272" x2="442" y2="272" stroke="#C97D00" stroke-width="3" stroke-dasharray="10 8"/>

	<!-- ring/buckle where the webbing crosses -->
	<circle cx="258" cy="256" r="34" fill="none" stroke="#D9D9D9" stroke-width="12"/>
	<circle cx="258" cy="256" r="34" fill="none" stroke="#9A9A9A" stroke-width="2"/>
</svg>
